<!DOCTYPE html>
<html>
<head>
  <title>Music Player</title>
  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .song {
      margin: 10px;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    img {
      width: 60px;
      border-radius: 8px;
    }

    #results {
      max-width: 600px;
      margin: auto;
    }
  </style>
</head>
<body>

  <h1>🎵 Music Search</h1>

  <input id="search" placeholder="Search song..." 
       onkeydown="if(event.key==='Enter') searchSongs()">
  <button onclick="searchSongs()">Search</button>

  <div id="results"></div>

  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
  const API = "https://music-production-3008.up.railway.app";
  let player;

  // YouTube Player ready
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '200',
      width: '300',
      videoId: ''
    });
  }

  async function searchSongs() {
    const query = document.getElementById("search").value;
    if (!query) return;

    const res = await fetch(`${API}/search?q=${query}`);
    const songs = await res.json();

    if (!songs.length) {
      alert("No song found 😢");
      return;
    }

    // 🎯 Take first song
    const song = songs[0];

    const searchQuery = `${song.name} ${song.artist}`;

    // 🔍 Search on YouTube
    const ytRes = await fetch(
      `https://ytsearch.vercel.app/api/search?q=${encodeURIComponent(searchQuery)}`
    );

    const ytData = await ytRes.json();

    if (!ytData.videos || ytData.videos.length === 0) {
      alert("No video found 😢");
      return;
    }

    const videoId = ytData.videos[0].id;

    // 🎵 Play video
    player.loadVideoById(videoId);

    // Show song info
    document.getElementById("results").innerHTML = `
      <div class="song">
        <img src="${song.image}" />
        <div>
          <b>${song.name}</b><br>
          ${song.artist}
        </div>
      </div>
    `;
  }
</script>
</body>
</html>

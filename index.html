<!DOCTYPE html>
<html>
<head>
  <title>Music Player</title>
  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .song {
      margin: 10px;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    img {
      width: 60px;
      border-radius: 8px;
    }

    #results {
      max-width: 600px;
      margin: auto;
    }
  </style>
</head>
<body>

  <h1>🎵 Music Search</h1>

  <input id="search" placeholder="Search song...">
  <button onclick="searchSongs()">Search</button>

  <div id="results"></div>

  <audio id="player" controls></audio>

  <script>
    const API = "http://localhost:3000"; // change after deploy

    async function searchSongs() {
      const query = document.getElementById("search").value;
      if (!query) return;

      const res = await fetch(`${API}/search?q=${query}`);
      const songs = await res.json();

      const results = document.getElementById("results");
      results.innerHTML = "";

      songs.forEach(song => {
        const div = document.createElement("div");
        div.className = "song";

        div.innerHTML = `
          <div style="display:flex;gap:10px;align-items:center">
            <img src="${song.image}" />
            <div>
              <b>${song.name}</b><br>
              ${song.artist}
            </div>
          </div>
          <button onclick="playSong('${song.preview}')">▶</button>
        `;

        results.appendChild(div);
      });
    }

    function playSong(url) {
      if (!url) {
        alert("No preview available 😢");
        return;
      }

      const player = document.getElementById("player");
      player.src = url;
      player.play();
    }
  </script>

</body>
</html>

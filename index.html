<!DOCTYPE html>
<html>
<head>
  <title>Music Player</title>
  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .song {
      margin: 10px;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    img {
      width: 60px;
      border-radius: 8px;
    }

    #results {
      max-width: 600px;
      margin: auto;
    }
  </style>
</head>
<body>

  <h1>🎵 Music Search</h1>

  <input id="search" placeholder="Search song..." 
       onkeydown="if(event.key==='Enter') searchSongs()">
  <button onclick="searchSongs()">Search</button>

  <div id="results"></div>

  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
const API = "https://music-production-3008.up.railway.app";

async function searchSongs() {
  const query = document.getElementById("search").value;
  if (!query) return;

  const res = await fetch(`${API}/search?q=${query}`);
  const songs = await res.json();

  if (!songs.length) {
    alert("No song found 😢");
    return;
  }

  const song = songs[0];

  const searchQuery = `${song.name} ${song.artist} official audio`;

  // 🎵 Embed YouTube player inside SAME page
  const videoUrl = `https://www.youtube.com/embed?autoplay=1&listType=search&list=${encodeURIComponent(searchQuery)}`;

  document.getElementById("player").innerHTML = `
    <iframe width="400" height="220"
      src="${videoUrl}"
      frameborder="0"
      allow="autoplay"
      allowfullscreen>
    </iframe>
  `;

  // Show song info + fallback button
  document.getElementById("results").innerHTML = `
    <div class="song">
      <img src="${song.image}" />
      <div>
        <b>${song.name}</b><br>
        ${song.artist}
      </div>
      <button onclick="openYT('${searchQuery}')">
        🔗 Open Full YouTube
      </button>
    </div>
  `;
}

// 🔗 fallback
function openYT(query) {
  window.open(
    `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`,
    "_blank"
  );
}
</script>
</body>
</html>
